name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Synchronize main
        run: |
          git fetch origin main --tags
          git pull --ff-only origin main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package
        run: |
          bun run test
          bun run check
          bun run build
          bun run test:scaffold
          npm pack --dry-run

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Reserve release in Git
        run: bash .github/scripts/reserve-release.sh

      - name: Publish tagged package to npm
        if: env.RELEASE_SHOULD_PUBLISH == 'true'
        run: |
          git checkout --detach "$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test "$(node -p "require('./package.json').version")" = "$RELEASE_VERSION"
          git diff --exit-code
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
