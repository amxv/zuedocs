name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package
        run: |
          bun run test
          bun run check
          bun run build
          bun run test:scaffold
          npm pack --dry-run

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Choose next unpublished patch version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PUBLISHED_VERSION="$(npm view "$PACKAGE_NAME" version)"
          npm version "$PUBLISHED_VERSION" --no-git-tag-version --allow-same-version
          npm version patch --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Commit release version
        run: |
          git add package.json
          git commit -m "chore: release v${RELEASE_VERSION} [skip ci] [skip release]"
          git tag "v${RELEASE_VERSION}"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tag
        run: |
          git push origin "v${RELEASE_VERSION}"

          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Main advanced during release push (attempt ${attempt}/3); retrying."
          done

          echo "Unable to persist the release version on main after 3 attempts."
          exit 1
